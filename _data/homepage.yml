hero:
  title: "Complex problems require more than recommendations."
  description: "SLKone embeds with leadership and operators to move critical work from decision to done. We bring the capacity, tools, analytics, AI-enabled workflows, and execution discipline to make change measurable."
  cta_text: "See How We Work"
  cta_link: "/how-we-work"

approach:
  title: "Decide. Align. Build. Execute. Prove."
  description: "The hard part is rarely one recommendation. It is getting the facts straight, making the tradeoffs explicit, aligning the people who own the work, building the operating muscle, and proving that the change created value."

unique_points:
  - title: "Decision Clarity"
    description: "We help teams frame options, quantify tradeoffs, and make defensible calls"
    icon: "fa-down-left-and-up-right-to-center"
  - title: "Embedded Delivery"
    description: "We work beside the people who have to run the process after the project ends"
    icon: "fa-person-running"
  - title: "Builder Capability"
    description: "We build the tools, models, automations, dashboards, and routines the work requires"
    icon: "fa-arrow-up-square-triangle"
  - title: "Governed Adoption"
    description: "We define controls, ownership, training, and cadence so the new way of working sticks"
    icon: "fa-shield-check"
  - title: "Cross-Functional Translation"
    description: "We connect strategy, finance, operations, technology, and change management"
    icon: "fa-arrows-spin"
  - title: "Proof Orientation"
    description: "We define the value logic early and measure whether the work actually changed performance"
    icon: "fa-timeline-arrow"

ai_enablement:
  title: "How We Work Faster"
  description: "AI is one part of the delivery model, not the identity of the firm. We use it when it helps teams shorten analysis, improve knowledge reuse, automate repeatable work, or build better operating tools."
  cta_text: "See How We Work"
  cta_link: "/services/digital-strategy-and-technology/#ai-enablement"
  points:
    - title: "Focused Working Sessions"
      description: "Get the right operators, leaders, facts, and decisions into the same room so the work can move."
      icon: "fa-route"
    - title: "Reusable Tools"
      description: "Build models, dashboards, automations, MCP integrations, and AI-enabled workflows where they reduce friction."
      icon: "fa-network-wired"
    - title: "Operating Cadence"
      description: "Create the ownership, decision forums, metrics, and follow-through needed to make change visible."
      icon: "fa-shield-check"
    - title: "Proof of Impact"
      description: "Measure whether the work improved revenue, cost, cash, cycle time, quality, or management control."
      icon: "fa-chart-line"

data_driven_approach:
  title: "How We Move From Ambiguity to Results"
  description: "Our process gives leadership teams a practical path from unclear priorities to implemented change, with enough evidence to know whether the work is creating value."
  steps:
    - title: "1. Decide"
      description: "Clarify the real decision"
      details: "We define the business question, surface constraints, gather the facts that matter, and help leadership compare options without hiding the tradeoffs."
      icon: "fa-lightbulb"
    - title: "2. Align"
      description: "Create commitment around the path"
      details: "We translate the decision into an operating plan, ownership model, metrics, and working cadence so teams know what has to change and who owns it."
      icon: "fa-chart-line"
    - title: "3. Build"
      description: "Make the new way of working usable"
      details: "We build the workflows, models, dashboards, AI tools, automations, governance, and training assets needed to make the operating plan real."
      icon: "fa-hammer"
    - title: "4. Execute and Prove"
      description: "Drive adoption and measure value"
      details: "We support execution with leadership cadence, issue resolution, and value tracking so the organization can see what changed and keep improving after we leave."
      icon: "fa-arrows-spin"

proof:
  title: "Proof Across Decisions, Systems, and Execution"
  description: "The work spans forecasting, automated revenue reporting, data products, workflow design, and hands-on implementation. These examples show the range."
  case_studies:
    - "Develop-and-Automate-Annual-Recurring-Revenue-for-$100M-Software-As-A-Service-Company"
    - "Forecasting-Financial-Performance-with-Machine-Learning-for-$10B-Oil-&-Gas-Organization"
    - "Cloud-based-Financial-Planning-&-Analysis-Solution-for-$100M-Software-As-A-Service-Company"

testimonials:
