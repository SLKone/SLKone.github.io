hero:
  title: "Practical AI for complex business challenges."
  description: "SLKone helps middle-market and PE-backed operators apply AI to the core of the business. We deploy Bridge, our AI-native operating platform, into your company and work alongside your team to implement it. We refine the same platform inside the companies we own through Amalgam Capital, so what we bring to you is already tested in real operations."
  cta_text: "See how Bridge works"
  cta_link: "/bridge"
  secondary_cta_text: "Talk to us"
  secondary_cta_link: "/contact"

proof_bar:
  text: "Deployed in live healthcare, electrical, and industrial-services operations. Refined inside companies we own through Amalgam Capital."

unique_points_title: "What sets SLKone apart"
unique_points:
  - title: "We run our own platform"
    description: "Bridge is our AI-native operating layer. Your team and your AI agents operate it on your data, in a tenant configured to your business."
    icon: "fa-microchip-ai"
  - title: "We implement, not just advise"
    description: "We embed alongside your team and build production systems. Each engagement is designed to deliver a working system, with measurable outcomes."
    icon: "fa-person-running"
  - title: "Proven on companies we own"
    description: "Through Amalgam Capital we operate real businesses. Bridge and our delivery model are tested in our own operations before we bring them to you."
    icon: "fa-building-circle-check"
  - title: "Deep, not wide"
    description: "Operator-level depth in the trades, building and industrial services, and healthcare operations. We focus where we know the work."
    icon: "fa-bullseye-arrow"
  - title: "Aligned economics"
    description: "We tie fees to the outcomes we deliver, not the hours we bill. Shared accountability, not billable targets."
    icon: "fa-handshake"
  - title: "Model-neutral"
    description: "Bridge is an operating layer above the model. You can use the best AI available without locking your operations to one vendor."
    icon: "fa-shuffle"

pillars:
  title: "How we work"
  subtitle: "Three pillars. Platform, embedded teams, and proof."
  items:
    - title: "Platform"
      description: "Bridge brings operations, planning, analytics, documents, and knowledge into one place. People and AI agents operate the same surface."
      icon: "fa-square-binary"
      link: "/bridge"
      link_text: "See the platform"
    - title: "Embedded teams"
      description: "Small senior teams work alongside yours, from roadmap to production. The people you meet are the people doing the work."
      icon: "fa-people-group"
      link: "/how-we-work"
      link_text: "How we deliver"
    - title: "Proof"
      description: "We run the same platform and approach inside the companies we own through Amalgam, so the model is tested in real operations before it reaches you."
      icon: "fa-trophy"
      link: "/proof"
      link_text: "See the proof"

bridge_teaser:
  heading: "Meet Bridge, our operating platform."
  body: "Bridge is the AI-native operating system we deploy into every engagement. It captures the work, structures it, and improves with use, so each engagement builds on the last."
  cta_text: "See the platform"
  cta_link: "/bridge"

problem_patterns:
  title: "What we solve"
  subtitle: "Six patterns we see across middle-market operations. Each is delivered through Bridge plus an embedded team."
  items:
    - title: "Work that was never economical to do by hand"
      slug: "work-never-economical"
      url: "/what-we-solve/work-never-economical/"
    - title: "Routine work that comes out inconsistent"
      slug: "inconsistent-routine-work"
      url: "/what-we-solve/inconsistent-routine-work/"
    - title: "Decisions bottlenecked by slow iteration"
      slug: "slow-iteration-decisions"
      url: "/what-we-solve/slow-iteration-decisions/"
    - title: "Time lost assembling context before anyone can act"
      slug: "context-assembly"
      url: "/what-we-solve/context-assembly/"
    - title: "Information your team can't get to"
      slug: "inaccessible-information"
      url: "/what-we-solve/inaccessible-information/"
    - title: "Knowledge that walks out the door"
      slug: "knowledge-walks-out"
      url: "/what-we-solve/knowledge-walks-out/"

proof_strip:
  title: "Proof in production"
  subtitle: "Measurable outcomes from live deployments."
  items:
    - title: "Reyco Electrical"
      kind: "Owned-company case study"
      situation: "A regional electrical contractor moving from spreadsheets and QuickBooks to a structured operating layer."
      deployed: "A Bridge tenant covering processes, planning, project economics, and document authoring, operated by the team and Bridge agents."
      outcome: "An operating system that replaced twelve tracking workbooks, with project margins visible the day the work happens."
      link: "/proof/reyco/"
      color: "amalgam"
    - title: "Healthcare AI enablement"
      kind: "Sanitized pattern"
      situation: "A multi-site specialty provider working through a broad AI-readiness question and a board-level revenue-cycle mandate."
      deployed: "Bridge ran the discovery itself. Eleven functional interviews were captured by the meeting agent and structured into a typed opportunity map."
      outcome: "A prioritized roadmap anchored on revenue-cycle economics, with the knowledge graph owned by the client tenant."
      link: "/proof/healthcare-ai-enablement/"
      color: "emerald"

amalgam_callout:
  heading: "The Amalgam flywheel"
  body: "Amalgam Capital is the platform through which we own and operate real-economy businesses. Running Bridge inside these companies is how we test and refine the same approach we bring to clients."
  cta_text: "See the flywheel"
  cta_link: "/amalgam"

testimonials:
  - quote: "I found you to listen more intently and more genuinely than many other firms. Also, you pushed back and helped redirect when needed in a very professional manner."
    name: "COO at an Industrial Products Manufacturer"
  - quote: "Access and agility. Our work together epitomized a high performance team passing the ball to each other without having to look. Access to anyone at anytime on your team helped, and agility in terms of keeping the group small, we were able to adapt and move fast."
    name: "SVP of Global Excellence at Oil and Gas Company"
  - quote: "Deep expertise coupled with humility and ability to engage with and build consensus with all levels of management."
    name: "Managing Director, Portfolio Support for Private Equity"

join_team:
  title: "Join the team"
  description: "We hire senior operators who want to build working systems alongside clients. If that fits how you work, we want to talk."
  cta_text: "See open roles"
  cta_link: "/careers"

