standards:
  naming: lowercase-kebab-case
  required:
    - utm_source
    - utm_medium
    - utm_campaign
  recommended:
    - utm_content
    - utm_id
  paid_search_only:
    - utm_term

allowed_mediums:
  organic-social: Unpaid social posts or profile links.
  paid-social: Paid social campaigns.
  paid-search: Search ads.
  email: Direct email, newsletter, or event follow-up.
  referral: Partner, advisor, or relationship referral links.
  event: Conference, webinar, QR code, or hosted event.
  direct-outreach: One-to-one BD outreach.

